services:
  postgis:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: udrive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - udrive_postgis:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d udrive"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: Host=postgis;Port=5432;Database=udrive;Username=postgres;Password=postgres
      AUTO_APPLY_MIGRATIONS: "true"
      ENABLE_SWAGGER: "true"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"
    depends_on:
      postgis:
        condition: service_healthy

volumes:
  udrive_postgis:
