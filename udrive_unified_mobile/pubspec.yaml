name: udrive_mobile
publish_to: "none"
description: Premium unified uDrive customer and driver app for Azad Kashmir tourism.
version: 8.0.0+8

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.6.0
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
